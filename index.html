<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>My todo-list</title>
  </head>
  <body>
    <div class="container">
      <h1>My Todo List</h1>
      <form id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new task..."
          required
        />
        <button type="submit" id="addi">Add Task</button>
      </form>
      <ul id="todo-list">
        <!-- Tasks will be added here dynamically -->
      </ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
